<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SEO Monitor</title>
  <link rel="stylesheet" href="/ui/assets/app.css">
  <link rel="stylesheet" href="/ui/assets/responsive.css">
  <link rel="stylesheet" href="/ui/assets/dashboard.css">
</head>
<body>
  <section id="login" class="login-shell hidden">
    <form id="login-form" class="login-card">
      <span class="eyebrow">THACT</span>
      <h1>SEO Monitor</h1>
      <p>Meld aan met de productie API-key.</p>
      <label for="api-key">API-key</label>
      <input id="api-key" type="password" autocomplete="current-password" required>
      <button type="submit">Aanmelden</button>
      <p id="login-error" class="error" role="alert"></p>
    </form>
  </section>

  <div id="app" class="app-shell hidden">
    <aside>
      <div><span class="eyebrow">THACT</span><h2>SEO Monitor</h2></div>
      <nav><button class="nav-active">Overzicht</button><button disabled>URLs</button><button disabled>Wijzigingen</button></nav>
      <button id="logout" class="quiet">Uitloggen</button>
    </aside>
    <main>
      <header>
        <div><span class="eyebrow">PRODUCTIE</span><h1>Technische SEO-acties</h1></div>
        <div class="selectors">
          <select id="client-select" aria-label="Klant"></select>
          <select id="website-select" aria-label="Website"></select>
        </div>
      </header>
      <section id="summary" class="cards"></section>
      <section class="panel">
        <div class="panel-head">
          <div><span class="eyebrow">ACTIELIJST</span><h2>Openstaande issues</h2></div>
          <span id="result-count" class="result-count"></span>
        </div>
        <div class="filters">
          <input id="search-filter" type="search" placeholder="Zoek op issue of URL" aria-label="Zoeken">
          <select id="severity-filter" aria-label="Ernst"><option value="">Alle prioriteiten</option><option value="high">Hoog</option><option value="medium">Middel</option><option value="low">Laag</option></select>
          <select id="type-filter" aria-label="Issue-type"><option value="">Alle issue-types</option></select>
          <select id="status-filter" aria-label="Status"><option value="active">Alleen actief</option><option value="new">Nieuw</option><option value="review">Te beoordelen</option><option value="planned">Gepland</option><option value="in_progress">Bezig</option><option value="waiting_for_client">Wacht op klant</option><option value="all">Inclusief historie</option></select>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Prioriteit</th><th>Issue en pagina</th><th>Status</th><th>Laatst gezien</th><th></th></tr></thead><tbody id="issues"></tbody></table></div>
        <p id="empty" class="empty hidden">Geen issues gevonden.</p>
        <footer class="pager"><button id="previous-page" class="page-button">Vorige</button><span id="page-label"></span><button id="next-page" class="page-button">Volgende</button></footer>
      </section>
    </main>
  </div>
  <dialog id="issue-dialog">
    <button id="close-dialog" class="dialog-close" aria-label="Sluiten">×</button>
    <span class="eyebrow">ISSUEDETAIL</span><h2 id="detail-title"></h2>
    <a id="detail-url" target="_blank" rel="noopener"></a>
    <dl><div><dt>Prioriteit</dt><dd id="detail-severity"></dd></div><div><dt>Status</dt><dd id="detail-status"></dd></div><div><dt>Beschrijving</dt><dd id="detail-description"></dd></div><div><dt>Aanbevolen actie</dt><dd id="detail-action"></dd></div></dl>
  </dialog>
  <script src="/ui/assets/app.js" defer></script>
</body>
</html>
