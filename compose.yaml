services:
  api:
    build: .
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    volumes: ["exports_data:/app/exports"]
    depends_on:
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
  worker:
    build: .
    env_file: .env
    command: python -m app.worker
    volumes: ["exports_data:/app/exports"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "from app.core.queue import get_redis; assert get_redis().ping()"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
  export-worker:
    build: .
    env_file: .env
    environment: ["WORKER_QUEUES=exports"]
    command: python -m app.worker
    volumes: ["exports_data:/app/exports"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "from app.core.queue import get_redis; assert get_redis().ping()"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
  scheduler:
    build: .
    env_file: .env
    command: python -m app.scheduler
    depends_on:
      redis: {condition: service_healthy}
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "from app.core.queue import get_redis; assert get_redis().ping()"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seo}
      POSTGRES_USER: ${POSTGRES_USER:-seo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seo}
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo -d seo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
volumes:
  postgres_data:
  redis_data:
  exports_data:
